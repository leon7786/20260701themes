<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinDynamicDesktop Free Themes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 50px 20px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom: none;
        }
        .header h1 {
            font-size: 2.8em;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.15em;
            font-weight: 400;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.15);
            padding: 15px 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .stat-value {
            font-size: 2.2em;
            font-weight: 700;
            color: #fff;
        }
        .stat-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-top: 4px;
        }
        .search-bar {
            max-width: 600px;
            margin: 35px auto;
            padding: 0 20px;
        }
        .search-bar input {
            width: 100%;
            padding: 16px 28px;
            border: 2px solid #e1e4e8;
            border-radius: 30px;
            background: #fff;
            color: #1a1a2e;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .search-bar input:focus {
            border-color: #667eea;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
        }
        .search-bar input::placeholder {
            color: #9ca3af;
        }
        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .theme-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .theme-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.12);
        }
        .theme-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f0f0f5;
            display: block;
        }
        .theme-info {
            padding: 18px;
        }
        .theme-name {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .theme-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            margin-bottom: 12px;
        }
        .theme-size {
            color: #667eea;
            font-size: 0.85em;
            background: rgba(102, 126, 234, 0.08);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }
        .theme-resolution {
            color: #6b7280;
            font-size: 0.85em;
        }
        .source-badge {
            display: inline-block;
            font-size: 0.75em;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .source-github {
            background: rgba(124, 77, 255, 0.1);
            color: #7c4dff;
        }
        .download-btn {
            display: block;
            width: 100%;
            padding: 13px;
            margin-top: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .download-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .footer {
            text-align: center;
            padding: 50px 20px;
            color: #6b7280;
            margin-top: 50px;
            background: #fff;
            border-top: 1px solid #e5e7eb;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            padding: 80px;
            color: #9ca3af;
            font-size: 1.1em;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .themes-grid { grid-template-columns: 1fr; }
            .stats { gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 WinDynamicDesktop Free Themes</h1>
        <p>374 free dynamic wallpapers for Windows — download directly from GitHub</p>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="total-count">374</div>
                <div class="stat-label">Free Themes</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">8.5GB</div>
                <div class="stat-label">Total Size</div>
            </div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search themes..." oninput="filterThemes()">
    </div>

    <div class="themes-grid" id="themes-container">
        <div class="loading">Loading themes...</div>
    </div>

    <div class="footer">
        <p>Data from <a href="https://windd.info/themes/" target="_blank">windd.info</a> |
           Download from <a href="https://github.com/leon7786/20260701themes/releases/tag/all-themes" target="_blank">GitHub Release</a> |
           <a href="https://github.com/leon7786/20260701themes" target="_blank">GitHub Repo</a></p>
    </div>

    <script>
        let themesData = {};
        const BASE_IMG = 'https://cdn.jsdelivr.net/gh/t1m0thyj/WDD-website@gh-pages/themes/images/thumbnails/';
        const GITHUB_DL = 'https://github.com/leon7786/20260701themes/releases/download/all-themes/';

        async function loadThemes() {
            try {
                const response = await fetch('themes.json');
                themesData = await response.json();
                renderThemes(themesData);
            } catch (e) {
                document.getElementById('themes-container').innerHTML =
                    '<div class="loading">Failed to load themes. Please refresh.</div>';
            }
        }

        function renderThemes(themes) {
            const container = document.getElementById('themes-container');
            container.innerHTML = '';

            Object.entries(themes).forEach(([id, theme]) => {
                const card = document.createElement('div');
                card.className = 'theme-card';

                const imgUrl = `${BASE_IMG}${id}_day.png`;
                const fallbackImg = `${BASE_IMG}${id}_night.png`;
                const downloadUrl = `${GITHUB_DL}${id}.ddw`;

                card.innerHTML = `
                    <img class="theme-image" src="${imgUrl}"
                         onerror="this.src='${fallbackImg}'; this.onerror=null;"
                         alt="${theme.displayName}" loading="lazy">
                    <div class="theme-info">
                        <div class="theme-name">${theme.displayName}</div>
                        <div class="theme-meta">
                            <span class="theme-resolution">${theme.imageSize || 'HD'}</span>
                            <span class="theme-size">${theme.fileSize} MB</span>
                        </div>
                        <span class="source-badge source-github">📦 GitHub Release</span>
                        <a href="${downloadUrl}" target="_blank" class="download-btn"
                           onclick="event.stopPropagation()">
                           ⬇️ Download .ddw
                        </a>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function filterThemes() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = {};

            Object.entries(themesData).forEach(([id, theme]) => {
                if (theme.displayName.toLowerCase().includes(query)) {
                    filtered[id] = theme;
                }
            });

            renderThemes(filtered);
        }

        loadThemes();
    </script>
</body>
</html>
